name: Build and Deploy PWA

on:
    push:
        branches: ["master"]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"
                  cache-dependency-path: pwa_react_quant/package-lock.json

            - name: Install Dependencies
              working-directory: ./pwa_react_quant
              run: npm install

            - name: Build
              working-directory: ./pwa_react_quant
              run: npm run build

            - name: Upload Pages Artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: pwa_react_quant/dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
